<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>
        Vihara Hospital AI Assistant
    </title>

    <link rel="stylesheet"
          href="{{ url_for('static',filename='style.css') }}">

</head>

<body>

<div class="main-container">

    <div class="header">

        <div>
            <h1>
                🏥 Vihara Hospital
            </h1>

            <h3>
                Multi Department AI Assistant
            </h3>
        </div>

        <div class="status">

            <span>🟢 AI Online</span>

        </div>

    </div>

    <div class="stats">

        <div class="stat-card">
            <h2>24x7</h2>
            <p>Emergency</p>
        </div>

        <div class="stat-card">
            <h2>7</h2>
            <p>Departments</p>
        </div>

        <div class="stat-card">
            <h2>500+</h2>
            <p>Patients Daily</p>
        </div>

        <div class="stat-card">
            <h2>AI</h2>
            <p>Powered Support</p>
        </div>

    </div>

    <form method="POST">

        <h2 class="section-title">

            Select Department

        </h2>

        <div class="department-grid">

            <label class="dept-card">
                <input type="radio"
                       name="department"
                       value="Reception"
                       required>

                <span>🏢 Reception</span>
            </label>

            <label class="dept-card">
                <input type="radio"
                       name="department"
                       value="Billing">

                <span>💳 Billing</span>
            </label>

            <label class="dept-card">
                <input type="radio"
                       name="department"
                       value="Insurance">

                <span>📑 Insurance</span>
            </label>

            <label class="dept-card">
                <input type="radio"
                       name="department"
                       value="Cardiology">

                <span>❤️ Cardiology</span>
            </label>

            <label class="dept-card">
                <input type="radio"
                       name="department"
                       value="Neurology">

                <span>🧠 Neurology</span>
            </label>

            <label class="dept-card">
                <input type="radio"
                       name="department"
                       value="Pharmacy">

                <span>💊 Pharmacy</span>
            </label>

            <label class="dept-card">
                <input type="radio"
                       name="department"
                       value="Emergency">

                <span>🚑 Emergency</span>
            </label>

        </div>

        <textarea
        name="question"
        placeholder="Ask anything about hospital services..."
        required></textarea>

        <button type="submit">

            Ask AI Assistant

        </button>

    </form>

    {% if answer %}

    <div class="response-card">

        <h2>
            🤖 AI Response
        </h2>

        <p>
            {{answer}}
        </p>

    </div>

    {% endif %}

</div>

</body>

</html>
